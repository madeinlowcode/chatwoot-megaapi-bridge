run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - gocritic
    - gosec
    - revive
    - prealloc

linters-settings:
  gosec:
    excludes:
      - G404 # math/rand acceptable in non-crypto contexts
  revive:
    rules:
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
